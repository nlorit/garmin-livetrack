services:
  garmin-livetrack:
    build: .
    ports:
      - "3080:3000"
    restart: always
    environment:
      - NODE_ENV=production

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - garmin-livetrack
    restart: always

volumes:
  caddy_data:
  caddy_config:
